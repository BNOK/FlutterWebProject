<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer circle background -->
  <circle cx="50" cy="50" r="48" fill="#942FA5" opacity="0.9"/>

  <!-- Inner geometric design -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#1CC0F3" stroke-width="2"/>

  <!-- Top accent -->
  <path d="M 50 20 L 50 35" stroke="#1CC0F3" stroke-width="3" stroke-linecap="round"/>

  <!-- Right accent -->
  <path d="M 80 50 L 65 50" stroke="#1CC0F3" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom accent -->
  <path d="M 50 80 L 50 65" stroke="#1CC0F3" stroke-width="3" stroke-linecap="round"/>

  <!-- Left accent -->
  <path d="M 20 50 L 35 50" stroke="#1CC0F3" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#1CC0F3"/>
</svg>